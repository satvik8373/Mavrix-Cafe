<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavrix Cafe - Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --background-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border-radius: 12px;
            --transition: all 0.3s ease;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        body {
            background: var(--background-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .admin-header {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: white;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--primary-color);
            background: var(--background-color);
            padding: 1rem;
            border-radius: 50%;
        }

        .stat-info h3 {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-info p {
            margin: 0.5rem 0 0;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .tab-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .tab-btn {
            padding: 1rem 2rem;
            border: none;
            background: transparent;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.5s ease;
        }

        .order-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .order-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--warning-color);
            transition: var(--transition);
        }

        .order-card.completed::before {
            background: var(--success-color);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .order-info {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--background-color);
            border-radius: var(--border-radius);
        }

        .order-items {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--background-color);
            border-radius: var(--border-radius);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pending {
            background: var(--warning-color);
            color: #856404;
        }

        .status-completed {
            background: var(--success-color);
            color: white;
        }

        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            background: transparent;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            color: var(--text-secondary);
            flex: 1;
            text-align: center;
        }

        .filter-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .no-orders {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            grid-column: 1 / -1;
        }

        .no-orders i {
            font-size: 3rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .product-card:hover::before {
            width: 6px;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .product-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .product-category {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            background: var(--background-color);
            color: var(--text-secondary);
            text-transform: capitalize;
        }

        .product-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: auto;
        }

        .action-btn {
            padding: 0.75rem;
            font-size: 0.9rem;
        }

        .edit-btn {
            background: var(--primary-color);
            color: white;
        }

        .edit-btn:hover {
            background: #34495e;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .toggle-btn {
            background: var(--success-color);
            color: white;
        }

        .toggle-btn.unavailable {
            background: var(--warning-color);
        }

        .product-form {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .product-form h2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .product-form h2 i {
            color: var(--primary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #eee;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .form-actions .submit-btn {
            flex: 2;
            margin-top: 0;
        }

        .form-actions .action-btn {
            flex: 1;
            background: var(--danger-color);
            color: white;
            padding: 1rem;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .product-actions {
                grid-template-columns: 1fr;
            }
            
            .product-header {
                flex-direction: column;
            }
            
            .product-price {
                align-self: flex-start;
            }

            .admin-container {
                padding: 10px;
            }
            
            .tab-container {
                padding: 0.5rem;
                flex-wrap: wrap;
            }
            
            .tab-btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
                flex: 1;
                justify-content: center;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .stat-card {
                padding: 1rem;
            }

            .product-form {
                padding: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .orders-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .filter-buttons {
                flex-wrap: wrap;
                gap: 0.5rem;
                justify-content: center;
            }

            .filter-btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
                flex: 1;
                min-width: 120px;
            }

            .time-filter {
                flex-wrap: wrap;
                gap: 0.5rem;
                justify-content: center;
            }

            .time-filter button {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
                flex: 1;
                min-width: 100px;
            }

            .qr-generator-btn {
                bottom: 1rem;
                right: 1rem;
                width: 50px;
                height: 50px;
            }

            .qr-generator-btn i {
                font-size: 1.2rem;
            }

            input[type="text"],
            input[type="number"],
            input[type="tel"],
            select {
                font-size: 16px !important;
                padding: 0.8rem !important;
            }

            .validation-message {
                font-size: 0.9rem;
                padding: 0.8rem;
            }
        }

        .header-actions .action-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: var(--border-radius);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions .action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .header-actions .action-btn i {
            animation: spin 1s linear infinite;
            animation-play-state: paused;
        }

        .header-actions .action-btn.refreshing i {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Dashboard Styles */
        .dashboard-container {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .stat-card.revenue::before { background: linear-gradient(to right, #2ecc71, #27ae60); }
        .stat-card.visits::before { background: linear-gradient(to right, #3498db, #2980b9); }
        .stat-card.orders::before { background: linear-gradient(to right, #e74c3c, #c0392b); }
        .stat-card.customers::before { background: linear-gradient(to right, #9b59b6, #8e44ad); }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #2c3e50;
        }

        .revenue .stat-icon { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .visits .stat-icon { background: linear-gradient(135deg, #3498db, #2980b9); }
        .orders .stat-icon { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .customers .stat-icon { background: linear-gradient(135deg, #9b59b6, #8e44ad); }

        .stat-title {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .stat-change {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-change.positive { color: #2ecc71; }
        .stat-change.negative { color: #e74c3c; }

        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 0 2rem;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .top-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .top-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .top-item:hover {
            transform: translateX(5px);
        }

        .top-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .top-item-info {
            flex: 1;
        }

        .top-item-title {
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.25rem;
        }

        .top-item-value {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .time-filter {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0 2rem;
        }

        .time-filter button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            background: #f8f9fa;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-filter button.active {
            background: #2c3e50;
            color: white;
        }

        .time-filter button:hover:not(.active) {
            background: #e9ecef;
        }

        /* Password Screen Styles */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--coffee-dark), var(--coffee-medium));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .password-container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-title {
            color: var(--coffee-dark);
            margin-bottom: 2rem;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .password-title i {
            color: var(--coffee-medium);
            font-size: 2rem;
        }

        .password-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .digit-input {
            width: 50px;
            height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 2rem;
            text-align: center;
            background: white;
            transition: all 0.3s ease;
            color: var(--coffee-dark);
            font-weight: 600;
            -webkit-text-security: disc;
        }

        .digit-input:focus {
            border-color: var(--coffee-medium);
            outline: none;
            box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.2);
            transform: translateY(-2px);
        }

        .password-message {
            color: #e74c3c;
            margin-bottom: 1.5rem;
            min-height: 24px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .password-message i {
            font-size: 1.2rem;
        }

        .password-button {
            background: linear-gradient(135deg, var(--coffee-dark), var(--coffee-medium));
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0 auto;
        }

        .password-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(111, 78, 55, 0.3);
        }

        .password-button:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            transform: none;
        }

        .password-button i {
            font-size: 1.2rem;
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Hide admin content initially */
        .admin-content {
            display: none;
        }

        .admin-content.visible {
            display: block;
        }

        /* Toast Styles */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 4px;
            background-color: #333;
            color: white;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background-color: #4CAF50;
        }

        .toast.error {
            background-color: #f44336;
        }

        .toast.info {
            background-color: #2196F3;
        }

        /* Order Card Styles */

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }, 100);
        }

        // Add these utility functions at the beginning of the script section
        async function fetchWithRetry(url, options = {}, maxRetries = 3) {
            let lastError;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        ...options,
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json',
                            ...options.headers
                        }
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                    }

                    return await response.json();
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error);
                    lastError = error;
                    
                    // Show notification only on final retry
                    if (i === maxRetries - 1) {
                        let errorMessage = 'Network error occurred. Please try again later.';
                        if (error.message.includes('blocked by CORS')) {
                            errorMessage = 'Connection to server failed. Please check your network.';
                        } else if (error.message.includes('502')) {
                            errorMessage = 'Server is temporarily unavailable. Please try again in a few minutes.';
                        }
                        
                        showNotification(errorMessage, 'error', 'Connection Error');
                    }
                    
                    // Wait before retrying (exponential backoff)
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                    }
                }
            }
            throw lastError;
        }

        // Update dashboard stats
        async function updateStats() {
            try {
                const [orders, menuItems] = await Promise.all([
                    fetchWithRetry(`${API_BASE_URL}/orders`),
                    fetchWithRetry(`${API_BASE_URL}/menu`)
                ]);
                
                if (!orders || !menuItems) {
                    throw new Error('Failed to fetch data');
                }
                
                // Calculate statistics
                const totalRevenue = orders.reduce((sum, order) => sum + order.totalAmount, 0);
                const totalOrders = orders.length;
                const activeItems = menuItems.filter(item => item.available).length;
                const pendingOrders = orders.filter(order => order.status === 'pending').length;
                const completedToday = orders.filter(order => {
                    const orderDate = new Date(order.timestamp);
                    const today = new Date();
                    return order.status === 'completed' && 
                           orderDate.toDateString() === today.toDateString();
                }).length;
                
                // Safely update DOM elements
                const updateElement = (id, value) => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.textContent = value;
                    }
                };

                // Update statistics
                updateElement('revenueValue', totalRevenue.toFixed(2));
                updateElement('ordersValue', totalOrders);
                updateElement('scansValue', totalOrders); // Using orders as proxy for scans
                updateElement('customersValue', new Set(orders.map(o => o.phoneNumber)).size);
                updateElement('pendingOrdersCount', pendingOrders);
                updateElement('completedOrdersCount', completedToday);
                updateElement('totalProductsCount', menuItems.length);

                // Calculate and display top products
                const productSales = {};
                orders.forEach(order => {
                    order.items.forEach(item => {
                        if (!productSales[item.name]) {
                            productSales[item.name] = { quantity: 0, revenue: 0 };
                        }
                        productSales[item.name].quantity += item.quantity;
                        productSales[item.name].revenue += item.price * item.quantity;
                    });
                });

                const topProducts = Object.entries(productSales)
                    .sort(([,a], [,b]) => b.revenue - a.revenue)
                    .slice(0, 5);

                const topProductsContainer = document.getElementById('topProducts');
                if (topProductsContainer) {
                    topProductsContainer.innerHTML = topProducts.length ? topProducts.map(([name, data]) => `
                        <div class="top-item">
                            <div class="top-item-icon">
                                <i class="fas fa-utensils"></i>
                            </div>
                            <div class="top-item-info">
                                <div class="top-item-title">${name}</div>
                                <div class="top-item-value">₹${data.revenue.toFixed(2)} • ${data.quantity} sold</div>
                            </div>
                        </div>
                    `).join('') : '<p>No sales data available</p>';
                }

                // Calculate and display top customers
                const customerSales = {};
                orders.forEach(order => {
                    if (!customerSales[order.phoneNumber]) {
                        customerSales[order.phoneNumber] = {
                            name: order.customerName,
                            visits: 0,
                            spent: 0
                        };
                    }
                    customerSales[order.phoneNumber].visits++;
                    customerSales[order.phoneNumber].spent += order.totalAmount;
                });

                const topCustomers = Object.entries(customerSales)
                    .sort(([,a], [,b]) => b.spent - a.spent)
                    .slice(0, 5);

                const topCustomersContainer = document.getElementById('topCustomers');
                if (topCustomersContainer) {
                    topCustomersContainer.innerHTML = topCustomers.length ? topCustomers.map(([phone, data]) => `
                        <div class="top-item">
                            <div class="top-item-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="top-item-info">
                                <div class="top-item-title">${data.name}</div>
                                <div class="top-item-value">₹${data.spent.toFixed(2)} • ${data.visits} visits</div>
                            </div>
                        </div>
                    `).join('') : '<p>No customer data available</p>';
                }
            } catch (error) {
                console.error('Error updating stats:', error);
                showToast('Error updating dashboard statistics', 'error');
            }
        }

        // Handle digit input and validation
        const passwordInput = document.getElementById('passwordInput');
        const digitInputs = [...passwordInput.getElementsByClassName('digit-input')];
        const submitPassword = document.getElementById('submitPassword');

        digitInputs.forEach((input, index) => {
            // Auto-focus first input on page load
            if (index === 0) {
                input.focus();
            }

            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                // Allow only numbers
                if (!/^\d*$/.test(value)) {
                    input.value = '';
                    return;
                }

                // Auto-move to next input
                if (value && index < digitInputs.length - 1) {
                    digitInputs[index + 1].focus();
                }

                // Check if all digits are filled
                if (index === digitInputs.length - 1 && value) {
                    const enteredPassword = digitInputs.map(input => input.value).join('');
                    validatePassword(enteredPassword);
                }

                // Enable submit button if all digits are filled
                const isComplete = digitInputs.every(input => input.value.length === 1);
                submitPassword.disabled = !isComplete;
            });

            input.addEventListener('keydown', (e) => {
                // Handle backspace
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    digitInputs[index - 1].focus();
                }
                // Handle Enter key
                if (e.key === 'Enter' && !submitPassword.disabled) {
                    const enteredPassword = digitInputs.map(input => input.value).join('');
                    validatePassword(enteredPassword);
                }
            });
        });

        // Enhanced password validation
        function validatePassword(enteredPassword) {
            if (enteredPassword === ADMIN_PASSWORD) {
                // Store authentication
                sessionStorage.setItem('adminAuthenticated', 'true');
                localStorage.setItem('adminPassword', ADMIN_PASSWORD);
                
                // Show admin content
                showAdminContent();
            } else {
                // Show error message and shake effect
                const passwordMessage = document.getElementById('passwordMessage');
                passwordMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Incorrect password. Please try again.';
                passwordMessage.style.color = '#e74c3c';
                passwordInput.classList.add('shake');
                
                // Clear inputs
                digitInputs.forEach(input => {
                    input.value = '';
                });
                digitInputs[0].focus();
                submitPassword.disabled = true;

                // Remove shake class after animation
                setTimeout(() => {
                    passwordInput.classList.remove('shake');
                }, 500);
            }
        }

        // Handle paste event for password
        passwordInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const numbers = pastedText.replace(/\D/g, '').slice(0, 6).split('');

        // Submit button click handler

        });

        // Handle paste event
        passwordInput.addEventListener('paste', (e) => {

        async function editProduct(productId) {
            try {
                if (!productId || productId.length < 24) {
                    showMessage('Invalid product ID', 'error');
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/menu/${productId}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to fetch product');
                }
                
                const product = await response.json();
                
                // Update form with product data
                document.getElementById('productId').value = productId;
                document.getElementById('productName').value = product.name || '';
                document.getElementById('productPrice').value = product.price || '';
                document.getElementById('productCategory').value = product.category || 'drinks';
                document.getElementById('productDescription').value = product.description || '';
                
                // Update form UI
                document.getElementById('formTitle').textContent = 'Edit Product';
                document.getElementById('submitButtonText').textContent = 'Update Product';

                // Show the form
                document.getElementById('productForm').style.display = 'block';

                console.error('Error editing product:', error);
                showMessage(error.message || 'Error loading product details', 'error');

        async function toggleAvailability(productId, newAvailability) {
            try {
                if (!productId || productId.length < 24) {
                    showMessage('Invalid product ID', 'error');
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/menu/${productId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ available: newAvailability })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to update product availability');
                }
                
                showNotification(
                    `Product is now ${newAvailability ? 'available' : 'unavailable'}`,
                    'success',
                    'Availability Updated'
                );
                
                await Promise.all([
                    displayProducts(),
                    updateStats()
                ]);
            } catch (error) {
                console.error('Error toggling availability:', error);
                showMessage(error.message || 'Error updating product availability', 'error');
            }
        }

        function deleteProductConfirm(productId) {
            if (confirm('Are you sure you want to delete this product?')) {

        function setupMobileOptimizations() {
            // Prevent double-tap zoom
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (event) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // Prevent pinch zoom
            document.addEventListener('touchmove', (event) => {
                if (event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });

            // Handle tab scrolling on mobile
            const tabContainer = document.querySelector('.tab-container');
            let isScrolling = false;
            let startX;
            let scrollLeft;

            tabContainer.addEventListener('touchstart', (e) => {
                isScrolling = true;
                startX = e.touches[0].pageX - tabContainer.offsetLeft;
                scrollLeft = tabContainer.scrollLeft;
            });

            tabContainer.addEventListener('touchmove', (e) => {
                if (!isScrolling) return;
                e.preventDefault();
                const x = e.touches[0].pageX - tabContainer.offsetLeft;
                const walk = (x - startX) * 2;
                tabContainer.scrollLeft = scrollLeft - walk;
            });

            tabContainer.addEventListener('touchend', () => {
                isScrolling = false;
            });
        }

        // Update the checkNewOrders function
        async function checkNewOrders() {
            if (!isPageVisible) return; // Don't check if page is not visible
            
            try {
                const orders = await fetchWithRetry(`${API_BASE_URL}/orders`, {}, 2);
                const newOrders = orders.filter(order => {
                    const orderTime = new Date(order.timestamp);
                    const lastCheck = new Date(lastOrderTimestamp);
                    return orderTime > lastCheck && order.status === 'pending';
                });
                
                if (newOrders.length > 0) {
                    lastOrderTimestamp = new Date().toISOString();
                    newOrders.forEach(order => {
                        showNewOrderAlert(order);
                    });
                    await Promise.all([
                        displayOrders(),
                        updateStats()
                    ]);
                }
            } catch (error) {
                console.error('Error checking for new orders:', error);
                // Don't show notification for polling errors
            }
        }

        function showNotification(message, type = 'success', title = '') {
            // Remove any existing notifications
            const existingNotifications = document.querySelectorAll('.notification');
            existingNotifications.forEach(notification => {
                notification.remove();
            });

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            let icon = 'check-circle';
            switch (type) {
                case 'error':
                    icon = 'exclamation-circle';
                    title = title || 'Error';
                    break;
                case 'warning':
                    icon = 'exclamation-triangle';
                    title = title || 'Warning';
                    break;
                default:
                    title = title || 'Success';
            }

            notification.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Remove notification on click
            notification.addEventListener('click', () => notification.remove());
            
            // Auto remove after 3 seconds
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease forwards';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add touch event handling for mobile
        function setupTouchHandling() {
            // Prevent zoom on double tap
            let lastTapTime = 0;
            document.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                if (tapLength < 500 && tapLength > 0) {
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            });

            // Improve scrolling on iOS
            document.addEventListener('touchmove', (e) => {
                if (e.target.closest('.tab-container, .orders-grid, .product-grid')) {
                    e.stopPropagation();
                }
            }, { passive: true });

            // Add active state for touch devices
            const buttons = document.querySelectorAll('button, .action-btn, .tab-btn');
            buttons.forEach(button => {
                button.addEventListener('touchstart', () => {
                    button.classList.add('active-touch');
                });
                button.addEventListener('touchend', () => {
                    button.classList.remove('active-touch');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isAuthenticated = sessionStorage.getItem('adminAuthenticated') === 'true';

                const passwordScreen = document.getElementById('passwordScreen');

        document.head.insertAdjacentHTML('beforeend', `
            <style>

                }
                
                /* Improve touch targets */
                button, .action-btn, .tab-btn {

                }

        `);

        // Add print receipt function
        function printReceipt(order) {
            // Create receipt template
            const receipt = document.createElement('div');
            receipt.className = 'print-receipt receipt-template';
            
            const timestamp = new Date(order.timestamp);
            const formattedDate = timestamp.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            const formattedTime = timestamp.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });

            receipt.innerHTML = `
                <div class="receipt-header">
                    <h2>Mavrix Cafe</h2>
                    <p>Invoice #${order._id.slice(-6).toUpperCase()}</p>
                    <p>${formattedDate} at ${formattedTime}</p>
                </div>
                
                <div class="receipt-info">
                    <div class="receipt-info-group">
                        <h3>Customer Details</h3>
                        <p><strong>Name:</strong> ${order.customerName}</p>
                        <p><strong>Phone:</strong> ${order.phoneNumber}</p>
                        <p><strong>Table:</strong> ${order.tableNumber}</p>
                    </div>
                    <div class="receipt-info-group">
                        <h3>Order Status</h3>
                        <p><strong>Status:</strong> ${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</p>
                        <p><strong>Payment:</strong> Completed</p>
                        <p><strong>Order Type:</strong> Dine In</p>
                    </div>
                </div>
                
                <table class="receipt-items">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${order.items.map(item => `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.quantity}</td>
                                <td>₹${item.price.toFixed(2)}</td>
                                <td>₹${(item.price * item.quantity).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <div class="receipt-total">
                    <p><strong>Subtotal:</strong> ₹${order.totalAmount.toFixed(2)}</p>
                    <p><strong>Tax (5%):</strong> ₹${(order.totalAmount * 0.05).toFixed(2)}</p>
                    <p class="grand-total"><strong>Grand Total:</strong> ₹${(order.totalAmount * 1.05).toFixed(2)}</p>
                </div>
                
                <div class="receipt-footer">
                    <p>Thank you for dining with us!</p>
                    <p class="print-only">This is a computer generated invoice</p>
                </div>
            `;
            
            // Add receipt to body
            document.body.appendChild(receipt);
            
            // Print receipt
            window.print();
            
            // Remove receipt after printing
            setTimeout(() => {
                document.body.removeChild(receipt);
            }, 1000);
        }
